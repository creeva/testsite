# Site settings
title:            Vermilion Sailor Alumni Band
tagline:          'Preserving the legacy of Vermilion High School bands'
description:      'Home of the Vermilion Sailor Alumni Band — history, media, and more.'
url:              https://creeva.github.io
baseurl:          '/testsite'

# Author
author:
  name:           Vermilion Sailor Alumni Band
  email:          vhsalumniband@gmail.com
  url:            https://creeva.github.io/testsite

# Build settings
markdown:         kramdown
highlighter:      rouge
permalink:        pretty
paginate:         5

# AsciiDoc / jekyll-asciidoc settings
asciidoc:
  processor:      asciidoctor
  ext:            adoc,asciidoc
  page_attribute_prefix: jekyll

asciidoctor:
  safe:           unsafe
  base_dir:       :docdir
  attributes:
    - hardbreaks-option
    - source-highlighter=rouge
    - rouge-style=github
    - icons=font
    - idprefix=
    - idseparator=-
    - sectlinks

# Plugins
plugins:
  - jekyll-asciidoc
  - jekyll-paginate

# Lanyon theme options
# Apply a theme: theme-base-08 through theme-base-0f, or leave blank for default
# lanyon_theme: theme-base-0d

# Reverse layout (sidebar on right): true/false
# reverse_layout: false

# Sidebar open by default on homepage: true/false
# sidebar_open: false

# Exclusions
exclude:
  - Gemfile
  - Gemfile.lock
  - Rakefile
  - README.adoc
  - LICENSE
  - vendor
