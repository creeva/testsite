title: Vermilion Sailor Alumni Band
url: https://creeva.github.io
baseurl: /testsite
description: Vermilion Sailor Alumni Band - Historic Marching Bands

exclude:
  - LICENSE
  - README.adoc
  - Gemfile
  - Gemfile.lock
  - Rakefile

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page

asciidoc: {}
asciidoctor:
  base_dir: :docdir
  safe: unsafe
  attributes:
    - icons=font
    - idseparator=_
    - imagesdir=/images
    - source-highlighter=coderay
    - liquid

plugins:
  - jekyll-asciidoc
  - jekyll-feed
