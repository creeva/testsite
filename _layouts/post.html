---
layout: default
---
<div class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">{{ page.date | date: "%B %d, %Y" }} &mdash; Creeva</div>
</div>
<div class="post-content">
    {{ content }}
</div>

{% if page.previous or page.next %}
<nav class="post-nav">
    <div class="post-nav-prev">
        {% if page.next %}
        <span class="post-nav-label">← Older</span>
        <a href="{{ page.next.url | prepend: site.baseurl }}">{{ page.next.title }}</a>
        {% endif %}
    </div>
    <div class="post-nav-next">
        {% if page.previous %}
        <span class="post-nav-label">Newer →</span>
        <a href="{{ page.previous.url | prepend: site.baseurl }}">{{ page.previous.title }}</a>
        {% endif %}
    </div>
</nav>
{% endif %}
