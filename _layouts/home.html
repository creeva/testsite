---
layout: default
---

<div class="post-grid">
{% for post in site.posts %}
  <article class="post-card">
    {% if post.image %}
    <a href="{{ post.url | prepend: site.baseurl }}">
      <img class="post-card-image" src="{{ post.image | prepend: site.baseurl }}" alt="{{ post.title }}">
    </a>
    {% else %}
    <div class="post-card-image-placeholder">✎</div>
    {% endif %}
    <div class="post-card-body">
      <div class="post-meta post-card-meta">{{ post.date | date: "%B %d, %Y" }}</div>
      <h2 class="post-card-title"><a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a></h2>
      {% if post.excerpt %}
      <p class="post-card-excerpt">{{ post.excerpt | strip_html | truncatewords: 25 }}</p>
      {% endif %}
    </div>
  </article>
{% endfor %}
</div>
