---
layout: default
---

<div class="post-list">
{% for post in site.posts %}
  <article class="post-card">
    <a class="post-card-thumb" href="{{ post.url | prepend: site.baseurl }}">
      {% if post.image %}
      <img src="{{ post.image }}" alt="{{ post.title }}">
      {% else %}
      <div class="post-card-thumb-placeholder">✎</div>
      {% endif %}
    </a>
    <div class="post-card-body">
      <div class="post-meta post-card-meta">{{ post.date | date: "%B %d, %Y" }}</div>
      <h2 class="post-card-title"><a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a></h2>
      {% if post.excerpt %}
      <p class="post-card-excerpt">{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
      {% endif %}
    </div>
  </article>
{% endfor %}
</div>
