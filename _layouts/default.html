<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --black: #111111;
            --dark: #1a1a1a;
            --mid: #444;
            --muted: #888;
            --light: #f5f3ef;
            --white: #ffffff;
            --accent: #c0392b;
            --border: #e0ddd8;
            --max-width: 1100px;
        }

        body {
            font-family: 'Source Sans 3', Georgia, serif;
            background: var(--light);
            color: var(--black);
            line-height: 1.7;
            font-size: 18px;
        }

        /* NAV */
        header {
            background: var(--white);
            border-bottom: 2px solid var(--border);
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }
        .header-inner {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .site-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.5rem;
            color: var(--black);
            text-decoration: none;
            padding: 1rem 0;
            letter-spacing: -0.02em;
        }
        .site-title span {
            color: var(--black);
        }
        nav {
            display: flex;
            gap: 0;
        }
        nav a {
            color: var(--mid);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 1.4rem 1rem;
            display: block;
            transition: color 0.15s, background 0.15s;
        }
        nav a:hover {
            color: var(--black);
            background: rgba(0,0,0,0.05);
        }

        /* MAIN */
        main {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 2.5rem 1.5rem 4rem;
        }

        /* POST LIST (home) */
        .post-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .post-card {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 1.5rem;
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border);
            background: transparent;
            transition: background 0.15s;
        }
        .post-card:first-child {
            border-top: 1px solid var(--border);
        }
        .post-card-thumb {
            flex-shrink: 0;
            width: 180px;
            height: 120px;
            display: block;
            overflow: hidden;
            border-radius: 3px;
            background: var(--border);
        }
        .post-card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s;
        }
        .post-card-thumb:hover img {
            transform: scale(1.04);
        }
        .post-card-thumb-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #e8e4de 0%, #d4cfc8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 2rem;
        }
        .post-card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .post-card-meta {
            font-size: 0.78rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.4rem;
        }
        .post-card-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.3rem;
            line-height: 1.3;
            margin-bottom: 0.5rem;
        }
        .post-card-title a {
            color: var(--black);
            text-decoration: none;
            transition: color 0.15s;
        }
        .post-card-title a:hover {
            color: var(--accent);
        }
        .post-card-excerpt {
            font-size: 0.9rem;
            color: var(--mid);
            line-height: 1.6;
        }

        /* SINGLE POST */
        .post-header {
            max-width: 760px;
            margin: 0 auto 2.5rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid var(--border);
        }
        .post-header h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            line-height: 1.2;
            margin-bottom: 0.75rem;
        }
        .post-meta {
            font-size: 0.85rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .post-content {
            max-width: 760px;
            margin: 0 auto;
        }
        .post-content h2 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.6rem;
            margin: 2.5rem 0 1rem;
            color: var(--black);
        }
        .post-content p {
            margin-bottom: 1.4rem;
        }
        .post-content img {
            max-width: 100%;
            height: auto;
            border-radius: 3px;
            margin: 1.5rem auto;
            display: block;
        }
        .post-content a {
            color: var(--accent);
        }

        /* PAGE (non-post) */
        .page-content {
            max-width: 760px;
            margin: 0 auto;
        }
        .page-content h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border);
        }

        /* FOOTER */
        footer {
            background: var(--white);
            color: var(--muted);
            text-align: center;
            padding: 1.5rem;
            font-size: 0.85rem;
            margin-top: 4rem;
            border-top: 2px solid var(--border);
        }
        footer a { color: var(--mid); }

        @media (max-width: 600px) {
            .post-card { flex-direction: column; }
            .post-card-thumb { width: 100%; height: 180px; }
            nav a { padding: 1rem 0.6rem; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <a class="site-title" href="{{ site.baseurl }}/">{{ site.title | split: " " | first }}<span>'s</span> {{ site.title | split: "'s " | last }}</a>
        <nav>
            <a href="{{ site.baseurl }}/">Home</a>
            <a href="{{ site.baseurl }}/about">About</a>
        </nav>
    </div>
</header>

<main>
    {{ content }}
</main>

<footer>
    <p>© {{ site.time | date: '%Y' }} {{ site.title }} &mdash; Built with Jekyll</p>
</footer>

</body>
</html>
