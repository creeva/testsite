<!-- Target for toggling the sidebar `.sidebar-checkbox` is for regular
     styles, `#sidebar-checkbox` for behavior. -->
<input type="checkbox" class="sidebar-checkbox" id="sidebar-checkbox"
    {% if page.sidebar_open or site.sidebar_open %}checked{% endif %}>

<!-- Toggleable sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-item">
    <p>{{ site.description }}</p>
  </div>

  <nav class="sidebar-nav">
    <a class="sidebar-nav-item{% if page.url == '/' %} active{% endif %}"
       href="{{ '/' | relative_url }}">Home</a>

    {% assign pages_list = site.pages | sort: 'title' %}
    {% for p in pages_list %}
      {% if p.layout == 'page' %}
        <a class="sidebar-nav-item{% if page.url == p.url %} active{% endif %}"
           href="{{ p.url | relative_url }}">{{ p.title }}</a>
      {% endif %}
    {% endfor %}

    <a class="sidebar-nav-item" href="{{ '/archive' | relative_url }}">Archive</a>
    <a class="sidebar-nav-item" href="{{ site.author.url }}">GitHub</a>
  </nav>

  <div class="sidebar-item">
    <p>&copy; {{ site.time | date: '%Y' }}. All rights reserved.</p>
  </div>
</div>
